<style>
  html,
  body {
    height: 100%;
    margin: 0;
  }

  body {
    background-image: url(https://wallpapercave.com/wp/wp7467454.jpg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    overflow-y: hidden;
    font-family: "Eagle Lake", serif;
  }

  input {
    background: linear-gradient(rgba(255, 218, 33, 0.2), rgba(0, 0, 0, 0.2)), transparent;
    border: 1;
    width: calc(100% - 15px);
    height: 50px;
    border-color: rgba(39, 174, 9, 0.515);
    border-width: 5px;
  }

  button {
    width: 96px;
    height: 30px;
    line-height: 20px;
    font-size: larger;
    margin: 5px 0px;
    background: linear-gradient(rgba(255, 218, 33, 0.2), rgba(255, 218, 33, 0.2)), transparent;
  }

  #forequal {
    width: 198px;
  }

  .box {
    margin: 50px 0px 100px 600px;
    height: 400px;
    width: 400px;
  }

  img {
    margin: 0px 0px 0px 500px;
  }

  ::placeholder {
    color: black;
    font-size: larger;
  }

  .box button {
    transition: all 0.4s ease;
  }

  .box button:hover {
    background: linear-gradient(rgba(255, 218, 33, 0.6), rgba(255, 218, 33, 0.6)), transparent;
    transform: scale(1.03);
  }
</style>

<body>
  <img height="400px" width="600px" src="/Ancient-calculation-table-and-symbols.png" alt="">
  <div class="box">
    <div class="row">
      <input id="result" type="text" placeholder="Your values will be shown here">
    </div>
    <div class="row">
      <button onclick="DisplayNumber(7)">
        7
      </button>
      <button onclick="DisplayNumber(8)">
        8
      </button>
      <button onclick="DisplayNumber(9)">
        9
      </button>
      <button onclick="DisplayNumber('&#247')">
        &#247;
      </button>
    </div>
    <div class="row">
      <button onclick="DisplayNumber(4)">
        4
      </button>
      <button onclick="DisplayNumber(5)">
        5
      </button>
      <button onclick="DisplayNumber(6)">
        6
      </button>
      <button onclick="DisplayNumber('&#215')">
        &#215;
      </button>
    </div>
    <div class="row">
      <button onclick="DisplayNumber(1)">
        1
      </button>
      <button onclick="DisplayNumber(2)">
        2
      </button>
      <button onclick="DisplayNumber(3)">
        3
      </button>
      <button onclick="DisplayNumber('&#8722')">
        &#8722;
      </button>
    </div>
    <div class="row">
      <button onclick="DisplayNumber(0)">
        0
      </button>
      <button onclick="DisplayNumber('00')">
        00
      </button>
      <button onclick="DisplayNumber('.')">
        .
      </button>
      <button onclick="DisplayNumber('&#43')">
        &#43;
      </button>
    </div>
    <div class="row">
      <button onclick="eraseAll()">
        AC
      </button>
      <button onclick="eraseRight()">
        &#9003;
      </button>
      <button id="forequal" onclick="output()">
        &#61;
      </button>
    </div>
  </div>


  <script>
    function DisplayNumber(num) {
      if (result.value === "0" || result.value === "Error") {
        result.value = num;
      } else {
        result.value += num;
      }
    }
    function eraseAll() {
      result.value = "0"
    }
    function eraseRight() {
      result.value = result.value.slice(0, -1)
    }
    function output() {
      try {
        let expression = result.value
          .replace(/\u00F7/g, "/")
          .replace(/\u00D7/g, "*")
          .replace(/\u2212/g, "-");

        result.value = eval(expression);
      } catch {
        result.value = "Error";
      }
    }
  </script>
</body>
